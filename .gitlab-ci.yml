---
# ─────────────────────────────────────────────────────────────────────────────
# sec100 — CI Pipeline
# Stage 1 (build):  Go multi-platform builds for go-3gpp-scanner
# Stage 2 (lint):   Python ruff + shellcheck + yamllint
# Stage 3 (test):   Python import, --help smoke tests, DB schema validation
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - build
  - lint
  - test

variables:
  GO_VERSION: "1.24"
  DOCKER_DRIVER: overlay2
  CGO_ENABLED: "1"
  PYTHON_IMAGE: "python:3.11-slim"
  SCRIPTS_DIR: "epdg"

# ── Go builds ─────────────────────────────────────────────────────────────────

image: golang:1.24-bullseye

before_script:
  - echo "Go version:" && go version
  - echo "Working in:" && pwd

build:linux-amd64:
  stage: build
  before_script:
    - apt-get update && apt-get install -y build-essential
  script:
    - cd go-3gpp-scanner
    - go mod download
    - |
      GOOS=linux GOARCH=amd64 CGO_ENABLED=1 \
      go build \
        -ldflags="-s -w -X main.version=${CI_COMMIT_SHA:0:8}" \
        -o bin/3gpp-scanner-linux-amd64 \
        ./cmd/3gpp-scanner
  artifacts:
    paths:
      - go-3gpp-scanner/bin/3gpp-scanner-linux-amd64
    expire_in: 30 days
  only:
    - main
    - merge_requests

build:linux-arm64:
  stage: build
  before_script:
    - apt-get update && apt-get install -y build-essential gcc-aarch64-linux-gnu
  script:
    - cd go-3gpp-scanner
    - go mod download
    - |
      GOOS=linux GOARCH=arm64 CGO_ENABLED=1 CC=aarch64-linux-gnu-gcc \
      go build \
        -ldflags="-s -w -X main.version=${CI_COMMIT_SHA:0:8}" \
        -o bin/3gpp-scanner-linux-arm64 \
        ./cmd/3gpp-scanner
  artifacts:
    paths:
      - go-3gpp-scanner/bin/3gpp-scanner-linux-arm64
    expire_in: 30 days
  only:
    - main
    - merge_requests

build:linux-arm:
  stage: build
  before_script:
    - apt-get update && apt-get install -y build-essential gcc-arm-linux-gnueabihf
  script:
    - cd go-3gpp-scanner
    - go mod download
    - |
      GOOS=linux GOARCH=arm CGO_ENABLED=1 CC=arm-linux-gnueabihf-gcc \
      go build \
        -ldflags="-s -w -X main.version=${CI_COMMIT_SHA:0:8}" \
        -o bin/3gpp-scanner-linux-arm \
        ./cmd/3gpp-scanner
  artifacts:
    paths:
      - go-3gpp-scanner/bin/3gpp-scanner-linux-arm
    expire_in: 30 days
  only:
    - main
    - merge_requests

build:macos-amd64:
  stage: build
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache build-base
  script:
    - cd go-3gpp-scanner
    - go mod download
    - |
      GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 \
      go build \
        -ldflags="-s -w -X main.version=${CI_COMMIT_SHA:0:8}" \
        -o bin/3gpp-scanner-darwin-amd64 \
        ./cmd/3gpp-scanner
  artifacts:
    paths:
      - go-3gpp-scanner/bin/3gpp-scanner-darwin-amd64
    expire_in: 30 days
  only:
    - main
    - merge_requests

build:macos-arm64:
  stage: build
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache build-base
  script:
    - cd go-3gpp-scanner
    - go mod download
    - |
      GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 \
      go build \
        -ldflags="-s -w -X main.version=${CI_COMMIT_SHA:0:8}" \
        -o bin/3gpp-scanner-darwin-arm64 \
        ./cmd/3gpp-scanner
  artifacts:
    paths:
      - go-3gpp-scanner/bin/3gpp-scanner-darwin-arm64
    expire_in: 30 days
  only:
    - main
    - merge_requests

build:windows-amd64:
  stage: build
  before_script:
    - apt-get update && apt-get install -y build-essential gcc-mingw-w64-x86-64
  script:
    - cd go-3gpp-scanner
    - go mod download
    - |
      GOOS=windows GOARCH=amd64 CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc \
      go build \
        -ldflags="-s -w -X main.version=${CI_COMMIT_SHA:0:8}" \
        -o bin/3gpp-scanner-windows-amd64.exe \
        ./cmd/3gpp-scanner
  artifacts:
    paths:
      - go-3gpp-scanner/bin/3gpp-scanner-windows-amd64.exe
    expire_in: 30 days
  only:
    - main
    - merge_requests

build:all:
  stage: build
  before_script:
    - apt-get update
    - apt-get install -y build-essential gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf gcc-mingw-w64-x86-64
  script:
    - cd go-3gpp-scanner
    - go mod download
    - make build-all
  artifacts:
    paths:
      - go-3gpp-scanner/bin/
    expire_in: 30 days
  only:
    - main

build:static:
  stage: build
  script:
    - cd go-3gpp-scanner
    - go mod download
    - |
      GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
      go build \
        -ldflags="-s -w -X main.version=${CI_COMMIT_SHA:0:8}" \
        -o bin/3gpp-scanner-static \
        ./cmd/3gpp-scanner
  artifacts:
    paths:
      - go-3gpp-scanner/bin/3gpp-scanner-static
    expire_in: 30 days
  only:
    - main
    - merge_requests

# ── Python lint ───────────────────────────────────────────────────────────────

python_syntax:
  stage: lint
  image: $PYTHON_IMAGE
  before_script:
    - echo "Python syntax check"
  script:
    - |
      for f in $SCRIPTS_DIR/*.py; do
        python3 -m py_compile "$f" && echo "OK  $f" || { echo "FAIL $f"; exit 1; }
      done
  rules:
    - changes:
        - epdg/*.py

python_lint:
  stage: lint
  image: $PYTHON_IMAGE
  before_script:
    - pip install --quiet ruff
  script:
    - ruff check --select E,W,F --ignore E501,E402,F401,F811 $SCRIPTS_DIR/
  rules:
    - changes:
        - epdg/*.py

bash_lint:
  stage: lint
  image: koalaman/shellcheck-alpine:stable
  before_script: []
  script:
    - shellcheck $SCRIPTS_DIR/*.sh
  rules:
    - changes:
        - epdg/*.sh

yaml_lint:
  stage: lint
  image: $PYTHON_IMAGE
  before_script:
    - pip install --quiet yamllint
  script:
    - yamllint .gitlab-ci.yml
  rules:
    - changes:
        - "*.yml"
        - "*.yaml"

# ── Python tests ──────────────────────────────────────────────────────────────

python_imports:
  stage: test
  image: $PYTHON_IMAGE
  before_script:
    - pip install --quiet -r $SCRIPTS_DIR/requirements.txt
  script:
    - python3 -c "import dns.resolver, requests, sqlite3"
    - python3 -c "import pandas, plotly.express"
    - python3 -c "import concurrent.futures, argparse, json, logging"
    - |
      for f in $SCRIPTS_DIR/3gpppub-*.py; do
        python3 -c "
import ast, sys
with open('$f') as fh:
    tree = ast.parse(fh.read())
print('AST OK:', '$f')
        "
      done
  rules:
    - changes:
        - epdg/*.py
        - epdg/requirements.txt

cli_help:
  stage: test
  image: $PYTHON_IMAGE
  before_script:
    - pip install --quiet -r $SCRIPTS_DIR/requirements.txt
  script:
    - python3 $SCRIPTS_DIR/3gpppub-dns-checker.py --help
    - python3 $SCRIPTS_DIR/3gpppub-dns-database-population.py --help
    - python3 $SCRIPTS_DIR/3gpppub-5g-discovery.py --help
    - python3 $SCRIPTS_DIR/3gpppub-asn-enricher.py --help
    - python3 $SCRIPTS_DIR/3gpppub-naptr-discovery.py --help
    - python3 $SCRIPTS_DIR/3gpppub-diff.py --help
    - python3 $SCRIPTS_DIR/3gpppub-grx-access.py --help
  rules:
    - changes:
        - epdg/*.py
        - epdg/requirements.txt

db_schema:
  stage: test
  image: $PYTHON_IMAGE
  before_script:
    - pip install --quiet -r $SCRIPTS_DIR/requirements.txt
  script:
    - python3 - << 'EOF'
import sqlite3, sys, os
from importlib.util import spec_from_file_location, module_from_spec

schemas = {
    'population': ('epdg/3gpppub-dns-database-population.py', 'SCHEMA'),
    '5g':         ('epdg/3gpppub-5g-discovery.py',            'SCHEMA_5G'),
    'naptr':      ('epdg/3gpppub-naptr-discovery.py',         'SCHEMA_NAPTR'),
    'diff':       ('epdg/3gpppub-diff.py',                    'SCHEMA_DIFF'),
}
for name, (path, attr) in schemas.items():
    spec = spec_from_file_location(name, path)
    mod  = module_from_spec(spec)
    spec.loader.exec_module(mod)
    conn = sqlite3.connect(':memory:')
    conn.executescript(getattr(mod, attr))
    conn.commit()
    tables = [r[0] for r in conn.execute(
        "SELECT name FROM sqlite_master WHERE type='table'"
    ).fetchall()]
    print(f"  {name:<12} tables: {tables}")
    conn.close()
print('All schemas OK.')
EOF
  rules:
    - changes:
        - epdg/*.py

subdomain_consistency:
  stage: test
  image: $PYTHON_IMAGE
  before_script: []
  script:
    - python3 - << 'EOF'
import sys, importlib.util

def load_module(name, path):
    spec = importlib.util.spec_from_file_location(name, path)
    mod  = importlib.util.module_from_spec(spec)
    spec.loader.exec_module(mod)
    return mod

# subdomains.py is the master — every file must import from it
master = load_module('subdomains', 'epdg/subdomains.py')
EXPECTED = set(master.SUBDOMAINS)
print(f'Master subdomains.py: {len(EXPECTED)} entries')

# Verify SCORE_WEIGHTS only references subdomains that exist in EXPECTED
bad_weights = set(master.SCORE_WEIGHTS) - EXPECTED
if bad_weights:
    print(f'FAIL: SCORE_WEIGHTS references unknown subdomains: {bad_weights}')
    sys.exit(1)
print(f'SCORE_WEIGHTS OK: {len(master.SCORE_WEIGHTS)} scoring entries')

# Verify sql_case_when() covers all subdomains
case_when = master.sql_case_when()
errors = 0
for s in EXPECTED:
    if s not in case_when:
        print(f'FAIL: {s} missing from sql_case_when() output')
        errors += 1
print(f'sql_case_when OK: all {len(EXPECTED)} subdomains present')

sys.exit(errors)
EOF
  rules:
    - changes:
        - epdg/*.py
