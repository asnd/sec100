services:

  # ── Scan (run once to populate the database) ──────────────────────────────
  # Usage:  docker compose run --rm scan
  #         docker compose run --rm scan --workers 30
  scan:
    build: .
    image: 3gpp-explorer
    environment:
      ENABLE_WEBUI: "0"
    volumes:
      - ${DATA_DIR:-./data}:/data
    command: ["scan", "--workers", "20"]
    profiles: [scan]

  # ── CLI mode (default) ────────────────────────────────────────────────────
  # Usage:  docker compose run --rm cli stats
  #         docker compose run --rm cli score --top 10
  #         docker compose run --rm cli search Vodafone
  cli:
    build: .
    image: 3gpp-explorer
    environment:
      ENABLE_WEBUI: "0"
    volumes:
      - ${DATA_DIR:-./data}:/data
    profiles: [cli]

  # ── Web UI mode ───────────────────────────────────────────────────────────
  # Usage:  docker compose --profile webui up
  #         then open http://localhost:8501
  webui:
    build: .
    image: 3gpp-explorer
    environment:
      ENABLE_WEBUI: "1"
    volumes:
      - ${DATA_DIR:-./data}:/data
    ports:
      - "8501:8501"
    profiles: [webui]
    restart: unless-stopped
